services:
  # Database Service (PostgreSQL 16)
  db:
    image: postgres:16-alpine
    container_name: zia_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Service (Caching & Queue)
  redis:
    image: redis:7-alpine
    container_name: zia_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend API Service (Laravel 11)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zia_backend
    restart: always
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  # ZIA Agent — Python FastAPI + Anthropic tool_use MCP
  zia-agent:
    build:
      context: ./zia-agent
      dockerfile: Dockerfile
    container_name: zia_agent
    restart: always
    environment:
      ZIA_BACKEND_URL: http://backend:8000
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "8001:8001"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Frontend SPA Service (Angular 21 + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zia_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
