# Deploy automático al VPS de pruebas (Hostinger) vía Coolify.
#
# Flujo: CI (ci.yml) en verde sobre master → build de las 3 imágenes (con
# IMAGE_TAG horneado como build-arg) → push a GHCR → trigger de deploy en
# Coolify (API, no SSH) → poll de versión real en backend (/api/health) y
# frontend (/version.txt) hasta que ambos confirmen el IMAGE_TAG esperado —
# no alcanza con "responde 200", hay que confirmar que sea el commit nuevo
# (ver comentario en "Wait for backend/frontend deploy" para el incidente
# 2026-07-24 que motivó este chequeo).
#
# Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
#   COOLIFY_API_TOKEN — Bearer token de Coolify (Keys & Tokens en el dashboard,
#                        usar uno dedicado a CI, no el token de administración manual)
#
#   COOLIFY_URL           — ej. https://coolify.softclass.co (dominio del dashboard;
#                            el puerto 8000/IP directa está cerrado por firewall)
#   COOLIFY_SERVICE_UUID  — UUID del servicio docker-compose en Coolify
#   BACKEND_HEALTH_URL    — ej. https://apiziaccb.softclass.co/api/health
#   FRONTEND_URL          — ej. https://ziaccb.softclass.co (sin barra final)

name: Deploy to VPS (Coolify)

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

env:
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  build-backend:
    name: Build & push — Backend (Laravel)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/zia-backend"
          docker build --build-arg IMAGE_TAG="$IMAGE_TAG" -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" ./backend
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

  build-agent:
    name: Build & push — ZIA Agent (Python)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/zia-agent"
          docker build -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" ./zia-agent
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

  build-frontend:
    name: Build & push — Frontend (Angular + Nginx)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/zia-frontend"
          docker build --build-arg IMAGE_TAG="$IMAGE_TAG" -t "$IMAGE:$IMAGE_TAG" -t "$IMAGE:latest" ./frontend
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:latest"

  deploy:
    name: Deploy via Coolify
    needs: [build-backend, build-agent, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Coolify guarda su propia copia del compose (no lee el repo en cada
      # deploy) — hay que sincronizarla antes de disparar el deploy o los
      # cambios a docker-compose.prod.yml nunca se aplican.
      - name: Sync docker-compose.prod.yml to Coolify
        run: |
          COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)
          curl -fsS -X PATCH "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_SERVICE_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_compose_raw\": \"$COMPOSE_B64\"}"

      # docker-compose.prod.yml usa ${IMAGE_TAG:-latest}. Coolify no siempre
      # vuelve a hacer pull de una imagen ya conocida por tag ":latest" al
      # redesplegar (visto en vivo: un deploy "exitoso" seguía sirviendo una
      # imagen de horas antes) — apuntar al SHA exacto de este build fuerza
      # un pull real porque Docker nunca ha visto ese tag localmente.
      - name: Pin IMAGE_TAG en Coolify al SHA de este build
        run: |
          curl -fsS -X PATCH "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_SERVICE_UUID }}/envs" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\": \"IMAGE_TAG\", \"value\": \"$IMAGE_TAG\"}"

      # force=true: visto en vivo (2026-07-24) que un deploy sin este flag puede
      # reportar éxito mientras el contenedor de frontend sigue sirviendo una
      # imagen de días antes — el health check del paso siguiente solo valida
      # el backend, así que ese caso pasaba desapercibido. force=true le pide
      # a Coolify que ignore su detección de cambios y rebuildee/recree igual.
      - name: Trigger Coolify deploy
        run: |
          curl -fsS -X GET "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_SERVICE_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      # 2026-07-24: un deploy "exitoso" sirvió una imagen de 6 días antes en
      # los 3 servicios (backend, agent, frontend) — causa real: la credencial
      # de GHCR del VPS estaba vencida, `docker compose pull` fallaba en
      # silencio y Coolify seguía sirviendo los contenedores viejos. Ni el
      # código 200 de /api/health ni el mensaje de Coolify lo detectaban,
      # porque ninguno de los dos confirma que la imagen sea la nueva. Por
      # eso este check ya no mide "responde", mide "responde con el commit
      # que acabamos de buildear" — /api/health expone `version` (IMAGE_TAG
      # horneado en el build, backend/Dockerfile) y se compara contra $IMAGE_TAG.
      - name: Wait for backend deploy (versión correcta)
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_HEALTH_URL }}" || echo "000")
            version=$(curl -fsS "${{ secrets.BACKEND_HEALTH_URL }}" 2>/dev/null | jq -r '.version // empty')
            if [ "$code" = "200" ] && [ "$version" = "$IMAGE_TAG" ]; then
              echo "✅ Backend sirviendo la versión esperada ($IMAGE_TAG)"
              exit 0
            fi
            echo "Intento $i: code=$code version=$version (esperando $IMAGE_TAG), reintentando en 10s..."
            sleep 10
          done
          echo "🚨 Backend no llegó a servir $IMAGE_TAG tras varios intentos — probable falla de pull/credenciales GHCR en el VPS, revisar docker login ahí antes de reintentar"
          exit 1

      # Mismo problema, mismo fix, del lado frontend: version.txt se genera en
      # build time (frontend/Dockerfile) con el IMAGE_TAG horneado y se sirve
      # como archivo estático — nginx no necesita saber nada de esto.
      - name: Wait for frontend deploy (versión correcta)
        run: |
          for i in $(seq 1 20); do
            version=$(curl -fsS "${{ secrets.FRONTEND_URL }}/version.txt" 2>/dev/null || echo "")
            if [ "$version" = "$IMAGE_TAG" ]; then
              echo "✅ Frontend sirviendo la versión esperada ($IMAGE_TAG)"
              exit 0
            fi
            echo "Intento $i: frontend en versión '$version' (esperando $IMAGE_TAG), reintentando en 10s..."
            sleep 10
          done
          echo "🚨 Frontend no llegó a servir $IMAGE_TAG tras varios intentos — probable falla de pull/credenciales GHCR en el VPS, revisar docker login ahí antes de reintentar"
          exit 1
